<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RoleRadar AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      width: 360px;
      background: #f9fafb;
      color: #111827;
    }

    /* ── Header ── */
    .header {
      background: #1e293b;
      color: white;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title  { font-weight: 700; font-size: 14px; letter-spacing: 0.01em; }
    .header-version { font-size: 10px; color: #94a3b8; font-weight: 400; margin-left: 6px; }

    /* ── Status badge ── */
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 9px; border-radius: 999px;
      background: #6b7280; color: white; white-space: nowrap;
    }
    .badge-new       { background: #6b7280; }
    .badge-saved     { background: #0077b5; }
    .badge-applied   { background: #16a34a; }
    .badge-rejected  { background: #dc2626; }
    .badge-oa        { background: #d97706; }
    .badge-interview { background: #2563eb; }
    .badge-offer     { background: #059669; }
    .badge-archived  { background: #9ca3af; }
    .badge-analyzed  { background: #7c3aed; }

    /* ── Warning banner ── */
    #warning {
      display: none;
      background: #fef9c3;
      border-left: 3px solid #ca8a04;
      color: #713f12;
      font-size: 11px;
      padding: 7px 12px;
      line-height: 1.5;
    }

    /* ── Form fields ── */
    .form {
      padding: 12px 14px 6px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label {
      font-size: 10px; font-weight: 700;
      color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .field input, .field textarea {
      border: 1px solid #d1d5db; border-radius: 4px;
      padding: 5px 8px; font-size: 12px; font-family: inherit;
      background: white; color: #111827; resize: none;
    }
    .field input:focus, .field textarea:focus {
      outline: none; border-color: #0077b5;
      box-shadow: 0 0 0 2px rgba(0,119,181,0.15);
    }
    .field textarea { height: 84px; }

    /* ── Extract status bar ── */
    .extract-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 14px 10px;
    }
    #extract-msg {
      font-size: 11px; color: #9ca3af;
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #extract-msg.ok      { color: #16a34a; }
    #extract-msg.warning { color: #d97706; }
    #extract-msg.error   { color: #dc2626; }
    #extract-msg.loading { color: #9ca3af; font-style: italic; }

    #btn-refresh {
      flex-shrink: 0; margin-left: 8px;
      font-size: 11px; font-family: inherit;
      padding: 3px 10px; background: white;
      border: 1px solid #d1d5db; border-radius: 4px;
      cursor: pointer; color: #374151;
    }
    #btn-refresh:hover    { background: #f3f4f6; border-color: #9ca3af; }
    #btn-refresh:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Action buttons ── */
    .actions {
      padding: 10px 14px 12px;
      display: flex; gap: 8px;
      border-top: 1px solid #e5e7eb;
    }
    .actions button {
      flex: 1; padding: 8px 0; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      color: white; font-family: inherit; transition: opacity 0.1s;
    }
    .actions button:disabled    { opacity: 0.4; cursor: not-allowed; }
    .actions button:not(:disabled):hover { opacity: 0.85; }
    #btn-save    { background: #0077b5; }
    #btn-applied { background: #16a34a; }
    #btn-analyze { background: #7c3aed; }

    /* ── Action status message ── */
    #status-msg {
      padding: 6px 14px 10px;
      font-size: 11px; min-height: 24px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280; line-height: 1.4;
    }
    #status-msg.loading { color: #6b7280; font-style: italic; }
    #status-msg.success { color: #16a34a; font-weight: 600; }
    #status-msg.error   { color: #dc2626; }

    /* ── Debug panel ── */
    .debug-panel { background: #0f172a; border-top: 2px solid #0f172a; }
    .debug-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 12px;
      border-bottom: 1px solid #1e293b;
    }
    .debug-title {
      font-size: 10px; font-weight: 700;
      color: #475569; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .debug-header-btns { display: flex; gap: 5px; }
    .debug-header-btns button {
      font-size: 10px; font-family: inherit;
      padding: 3px 9px; background: #1e293b;
      border: 1px solid #334155; border-radius: 3px;
      color: #94a3b8; cursor: pointer;
    }
    .debug-header-btns button:hover    { background: #334155; color: #e2e8f0; }
    .debug-header-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── DOM Recon section ── */
    .dom-debug-section { background: #070d18; border-top: 1px solid #1e293b; }
    .dom-debug-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 12px;
    }
    .dom-debug-title {
      font-size: 10px; font-weight: 700;
      color: #334155; text-transform: uppercase; letter-spacing: 0.1em;
    }
    #dom-debug-status { font-size: 10px; font-family: monospace; color: #4ade80; }
    #dom-debug-out {
      display: block; width: 100%; height: 150px;
      background: #070d18; color: #64748b;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 9px; line-height: 1.45;
      border: none; border-top: 1px solid #1e293b;
      padding: 8px 12px; resize: none; box-sizing: border-box;
    }
    #dom-debug-out:focus { outline: none; }

    #debug-rows {
      padding: 8px 12px 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .debug-row {
      display: flex; gap: 8px;
      font-size: 10px;
      font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
      line-height: 1.55;
    }
    .debug-key      { color: #475569; min-width: 178px; flex-shrink: 0; }
    .debug-val      { color: #94a3b8; word-break: break-all; }
    .dv-true        { color: #4ade80; }
    .dv-false       { color: #f87171; }
    .dv-error       { color: #f87171; font-style: italic; word-break: break-all; }
    .dv-null        { color: #334155; }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-title">
      RoleRadar AI
      <span class="header-version">v0.3-debug</span>
    </span>
    <span id="badge" class="badge">—</span>
  </div>

  <div id="warning"></div>

  <div class="form">
    <div class="field">
      <label>Title</label>
      <input id="f-title" type="text" placeholder="Job title">
    </div>
    <div class="field">
      <label>Company</label>
      <input id="f-company" type="text" placeholder="Company name">
    </div>
    <div class="field">
      <label>Location</label>
      <input id="f-location" type="text" placeholder="Location">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Expand 'Show more' on LinkedIn, then click ↺ Refresh"></textarea>
    </div>
  </div>

  <div class="extract-bar">
    <span id="extract-msg"></span>
    <button id="btn-refresh">↺ Refresh</button>
  </div>

  <div class="actions">
    <button id="btn-save">Save</button>
    <button id="btn-applied">Applied</button>
    <button id="btn-analyze">Analyze</button>
  </div>

  <div id="status-msg"></div>

  <div class="debug-panel">
    <div class="debug-header">
      <span class="debug-title">Debug</span>
      <div class="debug-header-btns">
        <button id="btn-debug-extract">Debug Extract</button>
        <button id="btn-copy-dom">Copy DOM</button>
      </div>
    </div>
    <div id="debug-rows"></div>
  </div>

  <div class="dom-debug-section">
    <div class="dom-debug-header">
      <span class="dom-debug-title">DOM Recon</span>
      <span id="dom-debug-status"></span>
    </div>
    <textarea id="dom-debug-out" readonly
      placeholder="Click 'Copy DOM' to capture the page structure for debugging…"></textarea>
  </div>

  <script src="popup.js"></script>
</body>
</html>
